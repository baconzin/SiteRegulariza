name: Build & Deploy to HostGator

on:
  push:
    branches: [ main, master ]   # funciona se o seu branch principal for main OU master
  workflow_dispatch:             # permite rodar manualmente

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React app
        working-directory: frontend
        run: npm run build

      - name: Deploy via FTP to HostGator
        uses: SamKirkland/FTP-Deploy-Action@v4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: frontend/build/   # origem (resultado do build)
          server-dir: /public_html/    # destino no HostGator
          exclude: |
            **/.git*
            **/.github/**
            **/.htaccess
          dangerous-clean-slate: false # não apaga tudo (preserva seu .htaccess)
